services:
  - type: web
    name: portfolio-tracker
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: PYTHON_VERSION
        value: 3.11.9
    disk:
      name: portfolio-data
      mountPath: /var/data
      sizeGB: 1
